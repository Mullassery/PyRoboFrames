[package]
name = "pyroboframes-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Core engine for PyRoboFrames: dataset reading, hardware video decode, and zero-copy windowing"

[dependencies]
thiserror.workspace = true
crossbeam-channel.workspace = true
serde = { version = "1", features = ["derive"] }
serde_json = "1"
arrow = "55"
parquet = "55"

# Decode dependencies are introduced as backends land:
#   videotoolbox    — Apple Media Engine HW decode (macOS), behind cfg(target_os = "macos")
#   ff-decode       — FFmpeg decode (Linux: VAAPI/NVDEC hwaccel + software fallback)

[dev-dependencies]
tempfile = "3"

[lints.clippy]
all = "warn"
